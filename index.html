<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kembara Sebutan Bandar</title>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --danger: #f44336;
            --sky: #87CEEB;
            --road: #444;
        }

        body {
            margin: 0;
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: var(--sky);
            position: relative;
            border: 8px solid #fff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        /* --- UI Atas --- */
        #header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.8);
            z-index: 10;
        }

        .stat-box {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }

        #progress-container {
            width: 100%;
            height: 10px;
            background: #ddd;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.5s;
        }

        /* --- Dunia Animasi --- */
        #world {
            flex-grow: 1;
            position: relative;
            background: linear-gradient(to bottom, var(--sky) 60%, #91cf60 60%, #91cf60 75%, var(--road) 75%);
            overflow: hidden;
        }

        #city-bg {
            position: absolute;
            bottom: 25%;
            width: 200%;
            font-size: 50px;
            white-space: nowrap;
            opacity: 0.6;
            animation: moveCity 60s linear infinite;
        }

        @keyframes moveCity {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        #car {
            position: absolute;
            bottom: 12%;
            left: 50px;
            font-size: 60px;
            z-index: 5;
            transition: transform 0.5s, left 1s;
            /* Memastikan kereta menghadap ke kanan */
            transform: scaleX(-1); 
        }

        #obstacle {
            position: absolute;
            bottom: 15%;
            right: 100px;
            font-size: 40px;
            transition: opacity 0.3s;
        }

        /* Animasi Pelanggaran */
        .crash {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: scaleX(-1) translate3d(-2px, 0, 0); }
            20%, 80% { transform: scaleX(-1) translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: scaleX(-1) translate3d(-8px, 0, 0); }
            40%, 60% { transform: scaleX(-1) translate3d(8px, 0, 0); }
        }

        /* --- UI Interaksi --- */
        #interaction-panel {
            background: white;
            padding: 20px;
            text-align: center;
            border-radius: 20px 20px 0 0;
            min-height: 250px;
            z-index: 10;
        }

        #feedback-msg {
            height: 30px;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        #display-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        #place-icon {
            font-size: 50px;
            background: #f8f8f8;
            padding: 10px;
            border-radius: 15px;
        }

        #sentence-text {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c3e50;
            max-width: 70%;
        }

        /* Butang Mikrofon */
        #mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: var(--secondary);
            color: white;
            font-size: 35px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
            transition: all 0.2s;
        }

        #mic-btn.active {
            background: var(--danger);
            transform: scale(1.1);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(244, 67, 54, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); }
        }

        #next-btn {
            display: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- Skrin Tamat --- */
        #end-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div class="stat-box" id="level-txt">Tahap 1 / 10</div>
        <div class="stat-box" id="score-txt">Markah: 0</div>
    </div>
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="world">
        <div id="city-bg">🏘️ 🌳 🏢 🌳 🏫 🌳 🏙️ 🌳 🏥 🌳 🏘️ 🌳 🏢 🌳</div>
        <div id="car">🚗</div>
        <div id="obstacle">🚧</div>
    </div>

    <div id="interaction-panel">
        <div id="feedback-msg">Klik butang dan mula sebut!</div>
        
        <div id="display-area">
            <div id="place-icon">🌳</div>
            <div id="sentence-text">Memuatkan...</div>
        </div>

        <button id="mic-btn">🎤</button>
        <button id="next-btn" onclick="goToNextLevel()">Tahap Seterusnya ➡</button>
    </div>

    <div id="end-screen">
        <h1 style="font-size: 3rem;">🎉 Tahniah!</h1>
        <p style="font-size: 1.5rem;">Permainan Tamat</p>
        <h2 id="final-score">Markah Akhir: 0</h2>
        <button onclick="location.reload()" style="padding: 15px 30px; border-radius: 50px; border: none; background: var(--secondary); color: white; cursor: pointer;">Main Semula</button>
    </div>
</div>

<script>
    // --- Data Ayat dan Ikon ---
    const levels = [
        { text: "Taman ini besar dan hijau.", icon: "🌳" },
        { text: "Perpustakaan itu sunyi dan bersih.", icon: "📚" },
        { text: "Pasar itu sibuk dan bising.", icon: "🛒" },
        { text: "Pusat membeli-belah itu besar dan terang.", icon: "🛍️" },
        { text: "Muzium itu lama tetapi menarik.", icon: "🏛️" },
        { text: "Hospital itu besar dan moden.", icon: "🏥" },
        { text: "Pawagam itu gelap tetapi selesa.", icon: "🎬" },
        { text: "Taman permainan itu berwarna-warni.", icon: "🎡" },
        { text: "Stesen kereta api itu sibuk.", icon: "🚉" },
        { text: "Bandar ini cantik dan bersih.", icon: "🏙️" }
    ];

    let currentLevel = 0;
    let score = 0;
    let recognition;
    let speechStartTime;

    // --- Elemen DOM ---
    const micBtn = document.getElementById('mic-btn');
    const nextBtn = document.getElementById('next-btn');
    const feedback = document.getElementById('feedback-msg');
    const car = document.getElementById('car');
    const obstacle = document.getElementById('obstacle');
    const sentenceText = document.getElementById('sentence-text');
    const placeIcon = document.getElementById('place-icon');
    const progressBar = document.getElementById('progress-bar');
    const levelTxt = document.getElementById('level-txt');
    const scoreTxt = document.getElementById('score-txt');

    // --- Inisialisasi Pengecaman Suara ---
    function initSpeech() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Maaf, pelayar anda tidak menyokong pengecaman suara. Sila gunakan Google Chrome.");
            return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = "ms-MY";
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = () => {
            speechStartTime = Date.now();
            micBtn.classList.add('active');
            feedback.innerText = "Mendengar...";
            feedback.style.color = "blue";
        };

        recognition.onend = () => {
            micBtn.classList.remove('active');
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            const duration = (Date.now() - speechStartTime) / 1000;

            if (duration < 1.0) {
                feedback.innerText = "Sila sebut ayat dengan jelas.";
                feedback.style.color = "orange";
                return;
            }

            checkAnswer(transcript);
        };

        recognition.onerror = (event) => {
            if(event.error === 'not-allowed') {
                feedback.innerText = "Sila benarkan akses mikrofon!";
            } else {
                feedback.innerText = "Cuba lagi...";
            }
            micBtn.classList.remove('active');
        };
    }

    // --- Logik Permainan ---
    async function requestMic() {
        try {
            await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    noiseSuppression: true,
                    echoCancellation: true,
                    autoGainControl: true
                } 
            });
            return true;
        } catch (err) {
            feedback.innerText = "Sila benarkan akses mikrofon untuk bermain permainan ini.";
            feedback.style.color = "red";
            return false;
        }
    }

    function checkAnswer(speech) {
        const target = levels[currentLevel].text.toLowerCase().replace(/[.,!]/g, "");
        const input = speech.toLowerCase().replace(/[.,!]/g, "");
        
        // Kira persamaan (similarity)
        const similarity = calculateSimilarity(input, target);

        if (similarity >= 0.75) {
            handleSuccess();
        } else {
            handleFailure();
        }
    }

    // Fungsi perbandingan mudah
    function calculateSimilarity(s1, s2) {
        let matches = 0;
        const words1 = s1.split(" ");
        const words2 = s2.split(" ");
        
        words2.forEach(word => {
            if (words1.includes(word)) matches++;
        });

        return matches / words2.length;
    }

    function handleSuccess() {
        score += 10;
        feedback.innerText = "Betul! +10 markah";
        feedback.style.color = "green";
        scoreTxt.innerText = `Markah: ${score}`;
        playSFX('success');

        // Gerakkan kereta melepasi halangan
        car.style.left = "calc(100% - 150px)";
        obstacle.style.opacity = "0";

        micBtn.style.display = "none";
        nextBtn.style.display = "inline-block";
    }

    function handleFailure() {
        feedback.innerText = "Cuba lagi";
        feedback.style.color = "red";
        playSFX('crash');

        // Animasi langgar
        car.classList.add('crash');
        setTimeout(() => car.classList.remove('crash'), 500);
    }

    function goToNextLevel() {
        currentLevel++;
        if (currentLevel < levels.length) {
            setupLevel();
        } else {
            showEndScreen();
        }
    }

    function setupLevel() {
        const data = levels[currentLevel];
        sentenceText.innerText = data.text;
        placeIcon.innerText = data.icon;
        levelTxt.innerText = `Tahap ${currentLevel + 1} / ${levels.length}`;
        progressBar.style.width = `${(currentLevel / levels.length) * 100}%`;
        
        // Reset Visual
        car.style.left = "50px";
        obstacle.style.opacity = "1";
        nextBtn.style.display = "none";
        micBtn.style.display = "inline-block";
        feedback.innerText = "Klik butang dan mula sebut!";
        feedback.style.color = "#666";
    }

    function showEndScreen() {
        document.getElementById('end-screen').style.display = "flex";
        document.getElementById('final-score').innerText = `Markah Akhir: ${score}`;
        progressBar.style.width = "100%";
    }

    // --- Kesan Bunyi Sintetik ---
    function playSFX(type) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'success') {
            osc.frequency.setValueAtTime(587, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        } else {
            osc.frequency.setValueAtTime(150, ctx.currentTime);
            gain.gain.setValueAtTime(0.2, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
        }

        osc.start();
        osc.stop(ctx.currentTime + 0.3);
    }

    // --- Event Listeners ---
    micBtn.addEventListener('click', async () => {
        const hasPermission = await requestMic();
        if (hasPermission && recognition) {
            recognition.start();
        }
    });

    // Mula Permainan
    initSpeech();
    setupLevel();

</script>
</body>
</html>
